exposedPort: 80
containers:
  - name: web
    image: registry.tourde.cloud/error-makers/web
    port: 80
    #env:
    #  DOTENV_B64: {{ BACKEND_ENV_B64 }}

  - name: mysql
    image: registry.tourde.cloud/error-makers/mysql
    port: 3306

  - name: minio
    image: registry.tourde.cloud/error-makers/minio
    port: 9000

  - name: redis
    image: registry.tourde.cloud/error-makers/redis
    port: 6379
build:
  - name: web
    context: ./
    dockerfile: ./Dockerfile
  - name: mysql
    context: ./tda26.mysql
    dockerfile: ./tda26.mysql/Dockerfile
  - name: minio
    context: ./tda26.minio
    dockerfile: ./tda26.minio/Dockerfile
  - name: redis
    context: ./tda26.redis
    dockerfile: ./tda26.redis/Dockerfile