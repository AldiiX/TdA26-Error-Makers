name: Build and push Web App to TdA

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      # vytvoreni env souboru pro backend
      - name: Write backend .env
        shell: bash
        run: |
          mkdir -p tda26.Server
          cat > tda26.Server/.env <<'__ENV__'
          ${{ secrets.DOTENV_BACKEND }}
          __ENV__

      - name: Upload to TdA
        uses: Student-Cyber-Games/upload-app@tda-26
        with:
          tdc_token: ${{ secrets.TDC_TOKEN }}